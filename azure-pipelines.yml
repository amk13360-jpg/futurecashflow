trigger:
- master

pool:
  vmImage: 'ubuntu-latest'

variables:
  azureSubscription: 'connectionservice'
  webAppName: 'fm-asp-dev-san'
  resourceGroupName: 'fm-rg-dev-san'

stages:
# =============================================================================
# Security Scanning Stage - Run security checks before building
# =============================================================================
- stage: Security
  displayName: 'Security Scanning'
  jobs:
  - job: SecurityScan
    displayName: 'Security Analysis'
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '20.x'
      displayName: 'Install Node.js'

    - script: |
        npm install --legacy-peer-deps
      displayName: 'Install dependencies'

    # NPM Audit - Check for known vulnerabilities in dependencies
    - script: |
        echo "Running npm audit..."
        npm audit --audit-level=high --json > npm-audit-report.json || true
        npm audit --audit-level=high || echo "##vso[task.logissue type=warning]npm audit found vulnerabilities"
      displayName: 'NPM Security Audit'
      continueOnError: true

    # Publish audit report as artifact
    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: 'npm-audit-report.json'
        ArtifactName: 'security-reports'
      displayName: 'Publish NPM Audit Report'
      condition: always()

    # Check for secrets in code (basic pattern matching)
    - script: |
        echo "Scanning for potential secrets..."
        # Check for common secret patterns
        if grep -rE "(password|secret|key|token)\s*[:=]\s*['\"][^'\"]{8,}['\"]" --include="*.ts" --include="*.tsx" --include="*.js" --include="*.json" . 2>/dev/null | grep -v node_modules | grep -v ".next" | grep -v "*.example"; then
          echo "##vso[task.logissue type=warning]Potential secrets found in code. Please review."
        else
          echo "No obvious secrets detected."
        fi
      displayName: 'Secret Detection Scan'
      continueOnError: true

    # License compliance check
    - script: |
        npx license-checker --production --summary || echo "License check completed"
      displayName: 'License Compliance Check'
      continueOnError: true

# =============================================================================
# Build Stage
# =============================================================================
- stage: Build
  displayName: 'Build Stage'
  dependsOn: Security
  condition: succeeded()
  jobs:
  - job: BuildJob
    displayName: 'Build Next.js App'
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '20.x'
      displayName: 'Install Node.js'

    - script: |
        npm install --legacy-peer-deps
        npm run build
      displayName: 'Install dependencies and build'
      env:
        NODE_ENV: production

    - script: |
        npm ci --production --legacy-peer-deps
      displayName: 'Install production dependencies'
      env:
        NODE_ENV: production

    - script: |
        echo "Verifying .next folder exists"
        ls -la .next
      displayName: 'Verify build output'

    - task: CopyFiles@2
      displayName: 'Copy files for deployment'
      inputs:
        SourceFolder: '$(System.DefaultWorkingDirectory)'
        Contents: |
          **
          !.git/**
          !.venv/**
          !.vscode/**
          !*.md
        TargetFolder: '$(Build.ArtifactStagingDirectory)/deploy'

    - task: ArchiveFiles@2
      displayName: 'Archive deployment files'
      inputs:
        rootFolderOrFile: '$(Build.ArtifactStagingDirectory)/deploy'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip'
        replaceExistingArchive: true

    - publish: $(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip
      artifact: drop

- stage: Deploy
  displayName: 'Deploy Stage'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: DeploymentJob
    displayName: 'Deploy to Azure App Service'
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebApp@1
            displayName: 'Deploy Azure Web App'
            inputs:
              azureSubscription: '$(azureSubscription)'
              appType: 'webAppLinux'
              appName: '$(webAppName)'
              package: '$(Pipeline.Workspace)/drop/$(Build.BuildId).zip'
              runtimeStack: 'NODE|20-lts'
              startUpCommand: 'node server.js'
              enableCustomDeployment: true
              deploymentMethod: 'zipDeploy'
