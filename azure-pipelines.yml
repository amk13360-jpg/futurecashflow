trigger:
- master

pool:
  vmImage: 'ubuntu-latest'

variables:
  azureSubscription: 'connectionservice'
  webAppName: 'fm-asp-dev-san'
  resourceGroupName: 'fm-rg-dev-san'

stages:
- stage: Build
  displayName: 'Build Stage'
  jobs:
  - job: BuildJob
    displayName: 'Build Next.js App'
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '20.x'
      displayName: 'Install Node.js'

    - script: |
        npm install --legacy-peer-deps
        npm run build
      displayName: 'Install dependencies and build'
      env:
        NODE_ENV: production

    - script: |
        echo "Verifying .next folder exists"
        ls -la .next
      displayName: 'Verify build output'

    - task: CopyFiles@2
      displayName: 'Copy files for deployment'
      inputs:
        SourceFolder: '$(System.DefaultWorkingDirectory)'
        Contents: |
          **
          !node_modules/**
          !.git/**
          !.venv/**
          !.vscode/**
          !*.md
        TargetFolder: '$(Build.ArtifactStagingDirectory)/deploy'

    - task: ArchiveFiles@2
      displayName: 'Archive deployment files'
      inputs:
        rootFolderOrFile: '$(Build.ArtifactStagingDirectory)/deploy'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip'
        replaceExistingArchive: true

    - publish: $(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip
      artifact: drop

- stage: Deploy
  displayName: 'Deploy Stage'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: DeploymentJob
    displayName: 'Deploy to Azure App Service'
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebApp@1
            displayName: 'Deploy Azure Web App'
            inputs:
              azureSubscription: '$(azureSubscription)'
              appType: 'webAppLinux'
              appName: '$(webAppName)'
              package: '$(Pipeline.Workspace)/drop/$(Build.BuildId).zip'
              runtimeStack: 'NODE|20-lts'
              startUpCommand: 'npm install --production --legacy-peer-deps && node_modules/.bin/next start'
              enableCustomDeployment: true
              deploymentMethod: 'zipDeploy'
